
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    padding:30px;
}

.box{
    width:900px;
    max-width:100%;
    background:#fff;
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    animation:fadeIn .7s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    text-align:center;
    color:#0d47a1;
    margin-bottom:30px;
    font-size:34px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:16px;
    font-weight:600;
    color:#333;
}

input{
    width:100%;
    padding:13px 15px;
    margin-bottom:18px;
    border:2px solid #d0d7e2;
    border-radius:10px;
    font-size:16px;
    transition:.3s;
    outline:none;
    background:#fafafa;
}

input:focus{
    border-color:#2196f3;
    background:white;
    box-shadow:0 0 10px rgba(33,150,243,.25);
}

button{
    padding:12px 22px;
    margin:8px 5px 20px 0;
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#2196f3,#1565c0);
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(33,150,243,.4);
}

button:active{
    transform:scale(.97);
}

hr{
    border:none;
    height:2px;
    background:#e6e6e6;
    margin:25px 0;
}

#count{
    margin-top:15px;
    font-size:18px;
    color:#2e7d32;
    background:#e8f5e9;
    display:inline-block;
    padding:10px 18px;
    border-radius:8px;
    font-weight:bold;
}

table{
    width:100%;
    margin-top:25px;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

th{
    background:linear-gradient(135deg,#1565c0,#42a5f5);
    color:white;
    padding:14px;
    font-size:16px;
}

td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid #eee;
}

tr:nth-child(even){
    background:#f8fbff;
}

tr:hover{
    background:#e3f2fd;
    transition:.3s;
}

#message{
    margin-top:20px;
    font-size:17px;
    font-weight:bold;
    color:#0d47a1;
    padding:12px;
    background:#eef6ff;
    border-left:5px solid #2196f3;
    border-radius:8px;
}

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#2196f3;
    border-radius:10px;
}

@media(max-width:768px){

    .box{
        padding:20px;
    }

    h1{
        font-size:28px;
    }

    table{
        display:block;
        overflow-x:auto;
    }

    button{
        width:100%;
        margin-bottom:10px;
    }
}
</style>
</head>
<body>

<div class="box">

<h1>Student Management System</h1>

<label>Student Name</label>
<input type="text" id="studentName" placeholder="Enter Student Name">

<label>Marks</label>
<input type="number" id="studentMarks" placeholder="Enter Marks">

<button onclick="addStudent()">Add Student</button>

<hr>

<label>Search Student</label>
<input type="text" id="searchName" placeholder="Enter Student Name">

<button onclick="searchStudent()">Search</button>

<h3 id="count">Total Students : 0</h3>

<table>
<tr>
<th>Name</th>
<th>Marks</th>
<th>Grade</th>
<th>Result</th>
</tr>
<tbody id="tableData">

</tbody>
</table>

<p id="message"></p>

</div>

<script>

let students=[];

function addStudent(){

let name=document.getElementById("studentName").value;
let marks=Number(document.getElementById("studentMarks").value);

if(name=="" || document.getElementById("studentMarks").value==""){
alert("Please Fill All Details");
return;
}

let grade="";
let result="";

if(marks>=90){
grade="A";
result="Pass";
}
else if(marks>=75){
grade="B";
result="Pass";
}
else if(marks>=50){
grade="C";
result="Pass";
}
else{
grade="Fail";
result="Fail";
}

let student={
name:name,
marks:marks,
grade:grade,
result:result
};

students.push(student);

showStudents();

document.getElementById("studentName").value="";
document.getElementById("studentMarks").value="";
}

function showStudents(){

let text="";

for(let i=0;i<students.length;i++){

text=text+"<tr>";
text=text+"<td>"+students[i].name+"</td>";
text=text+"<td>"+students[i].marks+"</td>";
text=text+"<td>"+students[i].grade+"</td>";

if(students[i].result=="Pass"){
text=text+"<td style='color:green;'>"+students[i].result+"</td>";
}
else{
text=text+"<td style='color:red;'>"+students[i].result+"</td>";
}

text=text+"</tr>";

}

document.getElementById("tableData").innerHTML=text;
document.getElementById("count").innerHTML="Total Students : "+students.length;

}

function searchStudent(){

let search=document.getElementById("searchName").value;
let found=false;

for(let i=0;i<students.length;i++){

if(students[i].name.toLowerCase()==search.toLowerCase()){

document.getElementById("message").innerHTML=
"Student Found : "+students[i].name+
" | Marks : "+students[i].marks+
" | Grade : "+students[i].grade+
" | Result : "+students[i].result;

found=true;

}

}

if(found==false){
document.getElementById("message").innerHTML="Student Not Found";
}

}

</script>

</body>
</html>
